# Ready-to-use default config for vaapi_whatsapp_180mb.sh
#
# Installed by default to:
#   ~/.config/nemo-actions/vaapi-whatsapp-180mb.conf

# Default output target size in MB when the action is launched without an
# explicit third argument.
NEMO_WA_TARGET_MB=180

# Default audio bitrate in kbit/s.
NEMO_WA_AUDIO_KBPS=128

# Maximum output dimensions.
NEMO_WA_MAX_WIDTH=1920
NEMO_WA_MAX_HEIGHT=1080

# Keep some safety margin below the requested target size.
NEMO_WA_SAFETY_FACTOR=0.94

# Optional explicit VA-API device.
# NEMO_WA_VAAPI_DEVICE=/dev/dri/renderD128
